<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping-Pong</title>
</head>
<body>
    <canvas id="folha" width="600" height="500">
        <script>
            var folhaDesenho = document.getElementById("folha");
            var areaDesenho = folhaDesenho.getContext("2d");

            var larguraCampo = 600;
            var alturaCampo = 500;
            var larguraLinha = 5;
            var larguraBola = 10;
            var alturaRaquete = 100; 

            // campo 
            areaDesenho.fillStyle = '#083166';
            areaDesenho.fillRect(0, 0, larguraCampo, alturaCampo);

            // linha do meio
            areaDesenho.fillStyle = '#ffffff';
            areaDesenho.fillRect(larguraCampo / 2 - larguraLinha/2, 0, 5, 500);

            // raquete jogador
            areaDesenho.fillRect(0, 30, larguraLinha, alturaRaquete);

            // raquete IA
            areaDesenho.fillRect(larguraCampo - larguraLinha, 30, larguraLinha, alturaRaquete);

            // bola (quadrada btw)
            areaDesenho.fillRect(30, 30, larguraBola, larguraBola);

        </script>
    </canvas>
</body>
</html>
