<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping-Pong</title>
</head>
<body>
    <canvas id="folha" width="600" height="500">
        <script>
            var folhaDesenho = document.getElementById("folha");
            var areaDesenho = folhaDesenho.getContext("2d");

            // campo 
            areaDesenho.fillStyle = '#083166';
            areaDesenho.fillRect(0, 0, 600, 500);

            // linha do meio
            areaDesenho.fillStyle = '#ffffff';
            areaDesenho.fillRect(297.5, 0, 5, 500);

            // raquete jogador
            areaDesenho.fillRect(0, 30, 5, 100);

            // raquete IA
            areaDesenho.fillRect(595, 30, 5, 100);

            // bola (quadrada btw)
            areaDesenho.fillRect(30, 30, 10, 10);

        </script>
    </canvas>
</body>
</html>
